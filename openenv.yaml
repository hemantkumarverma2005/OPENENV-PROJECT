spec_version: 1
name: SocialContract-v0
version: "1.0.0"
type: space
runtime: fastapi
app: app:app
port: 7860

# Human-readable metadata (surfaced in the OpenEnv registry)
description: >
  Economic Policy Advisory Environment: an LLM agent acts as a government
  advisor recommending 8 fiscal, monetary, trade, and labor policy levers
  per quarter for a population of 100 heterogeneous citizens across 4 income
  classes. Implements Phillips Curve, Okun's Law, Gini, Stackelberg investment
  dynamics, capital flight, strikes, and 9 exogenous shock types.
  5 tasks of escalating difficulty calibrated to real-world events
  (pre-2008 Ireland → COVID-19 pandemic). Full RL training pipeline included.

# Schema matches EconomicObservation and PolicyAction Pydantic models exactly.
# The SDK auto-derives JSON schemas at /schema; these are for human reference.
observation:
  fields:
    - {name: step, type: int}
    - {name: gdp, type: float}
    - {name: gdp_delta, type: float}
    - {name: gini, type: float}
    - {name: satisfaction, type: float}
    - {name: unrest, type: float}
    - {name: gov_budget, type: float}
    - {name: tax_rate, type: float}
    - {name: ubi_amount, type: float}
    - {name: public_good_level, type: float}
    - {name: inflation, type: float}
    - {name: unemployment, type: float}
    - {name: interest_rate, type: float}
    - {name: import_tariff, type: float}
    - {name: consumer_confidence, type: float}
    - {name: money_supply, type: float}
    - {name: minimum_wage, type: float}
    - {name: capital_flight_rate, type: float}
    - {name: strike_active, type: bool}
    - {name: private_investment, type: float}
    - {name: shock_event, type: str}
    - {name: shock_duration_remaining, type: int}
    - {name: poor_wealth, type: float}
    - {name: middle_wealth, type: float}
    - {name: wealthy_wealth, type: float}
    - {name: ultra_rich_wealth, type: float}
    - {name: task_id, type: str}
    - {name: task_description, type: str}

action:
  fields:
    - {name: tax_delta, type: float, range: [-0.10, 0.10]}
    - {name: ubi_delta, type: float, range: [-10.0, 10.0]}
    - {name: public_good_delta, type: float, range: [-0.10, 0.10]}
    - {name: interest_rate_delta, type: float, range: [-0.03, 0.03]}
    - {name: stimulus_package, type: float, range: [0.0, 500.0]}
    - {name: import_tariff_delta, type: float, range: [-0.05, 0.05]}
    - {name: money_supply_delta, type: float, range: [-500.0, 500.0]}
    - {name: minimum_wage_delta, type: float, range: [-2.0, 2.0]}
    - {name: reasoning, type: str}

reward:
  range: [0.0, 1.0]
  components: [gdp_growth, equality, satisfaction, unrest_penalty,
               deficit_penalty, volatility_penalty, task_progress]

tasks:
  - id: task1_stability
    difficulty: easy
    max_steps: 20
  - id: task2_recession
    difficulty: medium
    max_steps: 30
  - id: task3_crisis
    difficulty: hard
    max_steps: 40
  - id: task4_stagflation
    difficulty: expert
    max_steps: 35
  - id: task5_pandemic
    difficulty: expert
    max_steps: 30